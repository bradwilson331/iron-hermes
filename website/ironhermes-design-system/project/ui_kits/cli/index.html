<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>IronHermes — CLI UI kit</title>
  <link rel="stylesheet" href="terminal.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Scanner.jsx"></script>
  <script type="text/babel" src="StatusLine.jsx"></script>
  <script type="text/babel" src="Transcript.jsx"></script>
  <script type="text/babel" src="Prompt.jsx"></script>
  <script type="text/babel" src="Terminal.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const WELCOME = [
      { kind: 'cyan-big', text: 'IronHermes' },
      { kind: 'dim', text: 'v0.1.0 — type /help for commands, /quit to exit' },
      { kind: 'spacer' },
      { kind: 'you',    text: 'hello' },
      { kind: 'hermes', text: 'Ready. What do you want to build?' },
      { kind: 'spacer' },
    ];

    function App() {
      const [state, setState] = useState({
        lines: WELCOME,
        activity: 'idle',
        tokens: 12300,
        limit: 128000,
        model: 'claude-sonnet-4-20250514',
        provider: 'anthropic',
        mode: 'Chat',
        interrupts: 0,
      });

      const shelf = (
        <div className="shelf">
          <div className="hdr">demo</div>
          <button onClick={() => {
            setState(s => ({
              ...s,
              activity: { kind: 'tool', name: 'read_file' },
              lines: [...s.lines, { kind: 'tool', name: 'read_file', args: '{"path":"src/lib.rs"}' }],
            }));
            setTimeout(() => setState(s => ({
              ...s,
              activity: 'idle',
              lines: [...s.lines, { kind: 'dim', text: '  → 1843 lines' }, { kind: 'spacer' }],
            })), 2200);
          }}>trigger tool call</button>
          <button onClick={() => setState(s => ({ ...s, activity: s.activity === 'streaming' ? 'idle' : 'streaming' }))}>
            toggle streaming
          </button>
          <button onClick={() => setState(s => ({
            ...s,
            lines: [...s.lines,
              { kind: 'cmd-head', text: 'IronHermes Status' },
              { kind: 'cmd-kv', key: 'Home:',     value: '~/.ironhermes/' },
              { kind: 'cmd-kv', key: 'Model:',    value: s.model },
              { kind: 'cmd-kv', key: 'Provider:', value: s.provider },
              { kind: 'cmd-kv', key: 'Tokens:',   value: `${s.tokens} / ${s.limit}` },
              { kind: 'spacer' },
            ],
          }))}>/status</button>
          <button onClick={() => setState(s => ({
            ...s,
            lines: [...s.lines,
              { kind: 'cmd-head', text: 'Doctor' },
              { kind: 'doctor', ok: true,  label: 'Home directory' },
              { kind: 'doctor', ok: true,  label: 'Config file' },
              { kind: 'doctor', ok: false, label: '.env file' },
              { kind: 'doctor', ok: true,  label: 'OpenRouter API key' },
              { kind: 'doctor', ok: false, label: 'State database' },
              { kind: 'spacer' },
            ],
          }))}>/doctor</button>
          <button onClick={() => setState(s => ({
            ...s,
            lines: [...s.lines,
              { kind: 'dim', text: '^C — type /quit to exit' },
            ],
          }))}>send ^C</button>
          <button onClick={() => setState(s => ({ ...s, lines: [{ kind: 'dim', text: 'Conversation cleared.' }] }))}>
            clear
          </button>
        </div>
      );

      return <Terminal state={state} setState={setState} shelf={shelf} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
