<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>IronHermes Manager — Desktop</title>
  <link rel="stylesheet" href="desktop.css"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

  <!-- Tweakable defaults (edited via in-page Tweaks panel) -->
  <script>
    const IHM_TWEAKS = /*EDITMODE-BEGIN*/{
      "accent": "orange",
      "variant": "active-session",
      "scanlines": true,
      "density": "comfy"
    }/*EDITMODE-END*/;
    window.__IHM_SCANLINES = IHM_TWEAKS.scanlines;
    window.__IHM_TWEAKS = IHM_TWEAKS;

    // Accent swap (writes to :root)
    (function () {
      const map = {
        orange:  { brand: "#f0883e", brandHi: "#ffa657" },
        cyan:    { brand: "#4ec9b0", brandHi: "#6fd8c2" },
        magenta: { brand: "#c678dd", brandHi: "#d7a0ea" },
        green:   { brand: "#3fb950", brandHi: "#56d364" },
        yellow:  { brand: "#d29922", brandHi: "#e3b341" },
      };
      const c = map[IHM_TWEAKS.accent] || map.orange;
      document.documentElement.style.setProperty("--brand", c.brand);
      document.documentElement.style.setProperty("--brand-hi", c.brandHi);
    })();
  </script>

  <div id="root"></div>

  <!-- Component modules (order matters — Scanner.jsx must load before Desktop.jsx) -->
  <script type="text/babel" src="Scanner.jsx"></script>
  <script type="text/babel" src="Desktop.jsx"></script>

  <!-- Mount + tweaks panel -->
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    function TweaksPanel() {
      const [visible, setVisible] = useState(false);
      const [accent, setAccent] = useState(IHM_TWEAKS.accent);
      const [scanlines, setScanlines] = useState(IHM_TWEAKS.scanlines);
      const [variant, setVariant] = useState(IHM_TWEAKS.variant);
      const [density, setDensity] = useState(IHM_TWEAKS.density);

      useEffect(() => {
        const handler = (e) => {
          if (!e.data || typeof e.data !== 'object') return;
          if (e.data.type === '__activate_edit_mode') setVisible(true);
          if (e.data.type === '__deactivate_edit_mode') setVisible(false);
        };
        window.addEventListener('message', handler);
        // Announce after listener is live
        try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(_) {}
        return () => window.removeEventListener('message', handler);
      }, []);

      // Apply accent live
      useEffect(() => {
        const map = {
          orange:  { brand: "#f0883e", brandHi: "#ffa657" },
          cyan:    { brand: "#4ec9b0", brandHi: "#6fd8c2" },
          magenta: { brand: "#c678dd", brandHi: "#d7a0ea" },
          green:   { brand: "#3fb950", brandHi: "#56d364" },
          yellow:  { brand: "#d29922", brandHi: "#e3b341" },
        };
        const c = map[accent] || map.orange;
        document.documentElement.style.setProperty("--brand", c.brand);
        document.documentElement.style.setProperty("--brand-hi", c.brandHi);
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent } }, '*'); } catch(_) {}
      }, [accent]);

      useEffect(() => {
        window.__IHM_SCANLINES = scanlines;
        // Re-trigger render by dispatching a custom event the root listens to
        window.dispatchEvent(new CustomEvent("__ihm-tweak-change"));
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { scanlines } }, '*'); } catch(_) {}
      }, [scanlines]);

      useEffect(() => {
        window.__IHM_DENSITY = density;
        document.documentElement.style.setProperty(
          "--type-body", density === "dense" ? "0.8125rem" : "0.875rem"
        );
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { density } }, '*'); } catch(_) {}
      }, [density]);

      useEffect(() => {
        window.__IHM_VARIANT = variant;
        window.dispatchEvent(new CustomEvent("__ihm-tweak-change"));
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { variant } }, '*'); } catch(_) {}
      }, [variant]);

      if (!visible) return null;

      const swatches = [
        ["orange",  "#f0883e"],
        ["cyan",    "#4ec9b0"],
        ["magenta", "#c678dd"],
        ["green",   "#3fb950"],
        ["yellow",  "#d29922"],
      ];

      return (
        <div className="tweaks">
          <div className="t-hdr">
            <span>── TWEAKS ──</span>
            <button className="x" onClick={() => setVisible(false)}>×</button>
          </div>
          <div className="row">
            <span className="lbl">accent</span>
            <div className="swatch-row">
              {swatches.map(([name, col]) => (
                <button key={name}
                  className="sw"
                  aria-pressed={accent === name}
                  onClick={() => setAccent(name)}
                  style={{background: col}}
                  title={name}/>
              ))}
            </div>
          </div>
          <div className="row">
            <span className="lbl">scanlines</span>
            <input type="checkbox" checked={scanlines}
              onChange={e => setScanlines(e.target.checked)}/>
          </div>
          <div className="group">
            <div className="row">
              <span className="lbl">density</span>
              <select value={density} onChange={e => setDensity(e.target.value)}>
                <option value="comfy">comfy</option>
                <option value="dense">dense</option>
              </select>
            </div>
            <div className="row">
              <span className="lbl">variant</span>
              <select value={variant} onChange={e => setVariant(e.target.value)}>
                <option value="active-session">active session</option>
                <option value="server-dashboard">server dashboard</option>
                <option value="doctor-report">doctor report</option>
              </select>
            </div>
          </div>
        </div>
      );
    }

    function Root() {
      const [tick, setTick] = useState(0);
      useEffect(() => {
        const h = () => setTick(t => t + 1);
        window.addEventListener("__ihm-tweak-change", h);
        return () => window.removeEventListener("__ihm-tweak-change", h);
      }, []);
      return (
        <>
          <DesktopApp key={tick}/>
          <TweaksPanel/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
