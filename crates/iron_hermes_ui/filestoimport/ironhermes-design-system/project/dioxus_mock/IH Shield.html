<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>IH Shield — Caduceus brand mark</title>
  <link rel="stylesheet" href="../colors_and_type.css"/>
  <style>
    html, body { margin: 0; background: #f0eee9; font-family: "Ioskeley Mono", ui-monospace, monospace; }

    /* ── Hero card: the canonical mark on dark ── */
    .hero {
      background: radial-gradient(ellipse at center top, #1a1510 0%, #0a0805 70%);
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent 0 31px, rgba(200,146,87,0.08) 31px 32px),
        repeating-linear-gradient(90deg, transparent 0 31px, rgba(200,146,87,0.08) 31px 32px);
      pointer-events: none;
    }
    .hero img {
      max-width: 75%;
      max-height: 85%;
      filter:
        drop-shadow(0 0 60px rgba(240,136,62,0.25))
        drop-shadow(0 20px 40px rgba(0,0,0,0.7));
      position: relative; z-index: 2;
    }
    .hero .frame {
      position: absolute; inset: 24px;
      border: 1px solid rgba(200,146,87,0.3);
      pointer-events: none;
    }
    .hero .corners {
      position: absolute; inset: 20px;
      pointer-events: none;
    }
    .hero .corners span {
      position: absolute; width: 20px; height: 20px;
      border: 2px solid #c89257;
    }
    .hero .corners .tl { top: 0; left: 0; border-right: 0; border-bottom: 0; }
    .hero .corners .tr { top: 0; right: 0; border-left: 0; border-bottom: 0; }
    .hero .corners .bl { bottom: 0; left: 0; border-right: 0; border-top: 0; }
    .hero .corners .br { bottom: 0; right: 0; border-left: 0; border-top: 0; }
    .hero .caption {
      position: absolute;
      bottom: 32px; left: 50%; transform: translateX(-50%);
      color: #c89257; font-size: 11px; letter-spacing: 6px;
      z-index: 3;
    }
    .hero .caption .brand { color: #f0883e; font-weight: 900; }

    /* ── Detail card: anatomy, named parts ── */
    .anatomy {
      background: #0d1117;
      width: 100%; height: 100%;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 20px;
      color: #c9d1d9;
    }
    .anatomy img {
      width: 100%; height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(240,136,62,0.15));
    }
    .anatomy dl {
      margin: 0;
      font-size: 11px;
      line-height: 1.6;
    }
    .anatomy .hdr {
      color: #f0883e; font-size: 10px; font-weight: 700;
      letter-spacing: 3px; margin-bottom: 12px;
    }
    .anatomy dt {
      color: #c9d1d9; font-weight: 700; margin-top: 10px;
    }
    .anatomy dt:first-child { margin-top: 0; }
    .anatomy dt .n {
      color: #f0883e; display: inline-block; width: 22px;
    }
    .anatomy dd { margin: 2px 0 0 22px; color: #8a9199; }

    /* ── App-splash mockups ── */
    .splash {
      background: #0d1117;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      font-family: "Ioskeley Mono", monospace;
    }
    .splash img {
      width: 120px; height: auto;
      filter: drop-shadow(0 0 30px rgba(240,136,62,0.25));
    }
    .splash .wordmark {
      font-size: 24px; font-weight: 900; letter-spacing: -0.5px;
    }
    .splash .wordmark .o { color: #f0883e; }
    .splash .wordmark .w { color: #c9d1d9; }
    .splash .meta {
      color: #6a727a; font-size: 10px; letter-spacing: 4px;
    }
    .splash .loader {
      font-size: 12px; color: #4ec9b0; letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Favicon scale ── */
    .favs {
      background: #0d1117;
      width: 100%; height: 100%;
      padding: 24px;
      display: flex; flex-direction: column;
      gap: 14px; align-items: center; justify-content: center;
    }
    .favs .row {
      display: flex; gap: 22px; align-items: flex-end;
    }
    .favs .row .item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .favs img { display: block; }
    .favs .lab {
      font-family: "Ioskeley Mono", monospace;
      color: #8a9199; font-size: 9px;
    }
    .favs .note {
      color: #6a727a; font-family: "Ioskeley Mono", monospace;
      font-size: 10px; text-align: center; max-width: 300px; line-height: 1.6;
    }
    .favs .note .hi { color: #f0883e; }

    /* ── Horizontal lockup ── */
    .lockup {
      background: #0d1117;
      width: 100%; height: 100%;
      padding: 30px 40px;
      display: flex; align-items: center; gap: 30px;
    }
    .lockup img {
      height: 160px; width: auto;
      filter: drop-shadow(0 0 24px rgba(240,136,62,0.2));
    }
    .lockup .text {
      font-family: "Ioskeley Mono", monospace;
    }
    .lockup .name {
      font-size: 56px; font-weight: 900; letter-spacing: -2px;
      line-height: 1;
    }
    .lockup .name .o { color: #f0883e; }
    .lockup .name .w { color: #e8d4b2; }
    .lockup .sub {
      color: #6a727a; font-size: 12px; letter-spacing: 4px;
      margin-top: 10px;
    }
    .lockup .ver {
      color: #4ec9b0; font-size: 12px;
      margin-top: 4px;
    }

    /* ── Usage rules card ── */
    .rules {
      background: #f0eee9;
      padding: 24px;
      font-family: "Ioskeley Mono", monospace;
      font-size: 12px;
      color: #3a2a1a;
      line-height: 1.6;
    }
    .rules h3 {
      margin: 0 0 10px; font-size: 13px; font-weight: 900;
      color: #7a4a1c;
      letter-spacing: 2px;
    }
    .rules h4 {
      margin: 16px 0 6px; font-size: 11px; font-weight: 700;
      color: #7a4a1c;
      letter-spacing: 1px;
      border-top: 1px solid #c89257;
      padding-top: 8px;
    }
    .rules ul { margin: 0; padding-left: 18px; }
    .rules li { margin: 2px 0; }
    .rules .do { color: #2a5a2a; font-weight: 700; }
    .rules .dont { color: #7a2a1a; font-weight: 700; }

    /* ── Sketches bar at the bottom ── */
    .sketches-note {
      padding: 20px;
      font-family: "Ioskeley Mono", monospace;
      font-size: 11px; color: #6a727a;
      background: #1a1410;
      border: 1px dashed #4a2d10;
      line-height: 1.6;
    }
    .sketches-note .hdr { color: #f0883e; font-weight: 700; letter-spacing: 3px; margin-bottom: 8px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="Shields.jsx"></script>

<script type="text/babel">
const SHIELD = "../assets/ih-shield-caduceus-transparent-600.png";
const SHIELD_SMALL = "../assets/ih-shield-caduceus-transparent-256.png";

function Hero() {
  return (
    <div className="hero">
      <div className="frame"/>
      <div className="corners"><span className="tl"/><span className="tr"/><span className="bl"/><span className="br"/></div>
      <img src={SHIELD} alt="IronHermes shield"/>
      <div className="caption">
        <span className="brand">IRON·HERMES</span> · MMXXVI
      </div>
    </div>
  );
}

function Anatomy() {
  return (
    <div className="anatomy">
      <img src={SHIELD} alt=""/>
      <div>
        <div className="hdr">ANATOMY</div>
        <dl>
          <dt><span className="n">01</span>Wings</dt>
          <dd>Messenger of the gods. Spread, symmetric.</dd>
          <dt><span className="n">02</span>Shield</dt>
          <dd>Heater escutcheon, aged bronze, riveted edge.</dd>
          <dt><span className="n">03</span>Serpents</dt>
          <dd>Caduceus — twin snakes flank the monogram.</dd>
          <dt><span className="n">04</span>IH</dt>
          <dd>Engraved serif monogram. The center.</dd>
          <dt><span className="n">05</span>Patina</dt>
          <dd>Rust + verdigris. Wear is intentional.</dd>
        </dl>
      </div>
    </div>
  );
}

function AppSplash() {
  return (
    <div className="splash">
      <img src={SHIELD} alt=""/>
      <div className="wordmark"><span className="o">Iron</span><span className="w">Hermes</span></div>
      <div className="meta">V·2·0·0 · SELF·IMPROVING</div>
      <div className="loader">[████████░░] 80% loading soul.md</div>
    </div>
  );
}

function Favicons() {
  return (
    <div className="favs">
      <div className="row">
        {[16, 24, 32, 48, 64, 96].map(s => (
          <div className="item" key={s}>
            <img src={SHIELD_SMALL} width={s} height={Math.round(s * 1164/1000)} alt=""/>
            <div className="lab">{s}px</div>
          </div>
        ))}
      </div>
      <div className="note">
        reads down to <span className="hi">16px</span> — outline and wings survive;<br/>
        below 16px use the flat <span className="hi">IH</span> glyph only
      </div>
    </div>
  );
}

function Lockup() {
  return (
    <div className="lockup">
      <img src={SHIELD} alt=""/>
      <div className="text">
        <div className="name"><span className="o">Iron</span><span className="w">Hermes</span></div>
        <div className="sub">SELF · IMPROVING · AGENT</div>
        <div className="ver">v2.0.0 · rust 2024 · [OK]</div>
      </div>
    </div>
  );
}

function Rules() {
  return (
    <div className="rules">
      <h3>USAGE</h3>
      <h4>DO</h4>
      <ul>
        <li><span className="do">✓</span> Use on dark terminal backgrounds (≥ 60% contrast)</li>
        <li><span className="do">✓</span> Let the patina and rust show — don't flatten it</li>
        <li><span className="do">✓</span> Pair with Ioskeley Mono, orange accent</li>
        <li><span className="do">✓</span> Minimum clearspace = wing-width all sides</li>
      </ul>
      <h4>DON'T</h4>
      <ul>
        <li><span className="dont">×</span> Add a drop-shadow outline or white halo</li>
        <li><span className="dont">×</span> Recolor to flat brand colors</li>
        <li><span className="dont">×</span> Pair with emoji or sans-serif body copy</li>
        <li><span className="dont">×</span> Use below 16px — use the IH glyph instead</li>
      </ul>
    </div>
  );
}

function SketchesNote() {
  return (
    <div className="sketches-note">
      <div className="hdr">EARLY SKETCHES · ARCHIVED</div>
      The four SVG explorations below (caduceus, petasos, talaria, emblem) were the initial
      direction-finding sketches. The canonical mark above — a rendered illustration with
      true oxidation patina and texture — is the adopted identity. Keep these for reference;
      do not ship them.
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="canonical" title="The mark" subtitle="Caduceus shield — adopted identity, rendered in aged bronze.">
        <DCArtboard id="hero" label="00 · The mark" width={720} height={720}>
          <Hero/>
        </DCArtboard>
        <DCArtboard id="anatomy" label="01 · Anatomy" width={560} height={520}>
          <Anatomy/>
        </DCArtboard>
        <DCArtboard id="rules" label="02 · Usage rules" width={360} height={520}>
          <Rules/>
        </DCArtboard>
      </DCSection>

      <DCSection id="contexts" title="In context" subtitle="How the mark ships.">
        <DCArtboard id="lockup" label="horizontal lockup" width={640} height={240}>
          <Lockup/>
        </DCArtboard>
        <DCArtboard id="splash" label="app splash" width={320} height={480}>
          <AppSplash/>
        </DCArtboard>
        <DCArtboard id="favicons" label="favicon scale test" width={520} height={240}>
          <Favicons/>
        </DCArtboard>
      </DCSection>

      <DCSection id="archive" title="Early sketches — archived" subtitle="Direction-finding sketches, superseded by the canonical mark above.">
        <DCArtboard id="a1" label="sketch · caduceus (SVG)" width={400} height={480}>
          <CaduceusShield/>
        </DCArtboard>
        <DCArtboard id="a2" label="sketch · petasos (SVG)" width={400} height={480}>
          <PetasosShield/>
        </DCArtboard>
        <DCArtboard id="a3" label="sketch · talaria (SVG)" width={400} height={480}>
          <TalariaShield/>
        </DCArtboard>
        <DCArtboard id="a4" label="sketch · emblem (SVG)" width={400} height={480}>
          <EmblemShield/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
