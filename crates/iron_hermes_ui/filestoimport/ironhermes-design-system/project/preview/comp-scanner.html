    <div><span style="color:var(--fg-dim)">░░░░░░░</span><span style="color:var(--ansi-cyan);opacity:0.6">▒</span><span style="color:var(--ansi-cyan)">▓</span><span style="color:var(--ansi-bright-cyan)">█</span> <span style="color:var(--fg-dim);font-size:12px">tick 9</span></div>
  </div>
