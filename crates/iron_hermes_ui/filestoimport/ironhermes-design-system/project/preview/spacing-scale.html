<!doctype html><html><head><meta charset="utf-8"><title>spacing-scale</title><link rel="stylesheet" href="_card.css"></head><body><div class="card ">
  <div style="display:flex;flex-direction:column;gap:10px;font-size:13px">
    <div style="display:flex;align-items:center;gap:14px"><span class="label" style="width:72px">--space-0</span><div style="height:10px;width:0px;background:var(--ansi-cyan)"></div><span style="color:var(--fg-dim);font-size:12px">0px</span></div><div style="display:flex;align-items:center;gap:14px"><span class="label" style="width:72px">--space-1</span><div style="height:10px;width:4px;background:var(--ansi-cyan)"></div><span style="color:var(--fg-dim);font-size:12px">4px</span></div><div style="display:flex;align-items:center;gap:14px"><span class="label" style="width:72px">--space-2</span><div style="height:10px;width:8px;background:var(--ansi-cyan)"></div><span style="color:var(--fg-dim);font-size:12px">8px — 1 cell</span></div><div style="display:flex;align-items:center;gap:14px"><span class="label" style="width:72px">--space-3</span><div style="height:10px;width:16px;background:var(--ansi-cyan)"></div><span style="color:var(--fg-dim);font-size:12px">16px — panel pad</span></div><div style="display:flex;align-items:center;gap:14px"><span class="label" style="width:72px">--space-4</span><div style="height:10px;width:24px;background:var(--ansi-cyan)"></div><span style="color:var(--fg-dim);font-size:12px">24px — section gap</span></div><div style="display:flex;align-items:center;gap:14px"><span class="label" style="width:72px">--space-5</span><div style="height:10px;width:32px;background:var(--ansi-cyan)"></div><span style="color:var(--fg-dim);font-size:12px">32px</span></div><div style="display:flex;align-items:center;gap:14px"><span class="label" style="width:72px">--space-6</span><div style="height:10px;width:48px;background:var(--ansi-cyan)"></div><span style="color:var(--fg-dim);font-size:12px">48px</span></div>
  </div></div></body></html>
