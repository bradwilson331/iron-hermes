<!doctype html><html><head><meta charset="utf-8"><title>brand-no-emoji</title><link rel="stylesheet" href="_card.css"></head><body><div class="card ">
  <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
    <div style="color:var(--brand);font-weight:700;font-size:15px">No emoji in operator voice</div>
    <div style="color:var(--fg-dim);font-size:12px">ASCII + Unicode box-drawing only</div>
    <div style="margin-top:6px;font-size:13px;font-family:var(--font-mono);line-height:1.7">
      <div>  use: <span style="color:var(--ansi-green)">[OK]</span> <span style="color:var(--ansi-yellow)">[MISSING]</span> <span style="color:var(--ansi-red)">[FAIL]</span></div>
      <div>  never: <span style="color:var(--fg-dim);text-decoration:line-through">✓ ✗ 🚀 🔥 ✅</span></div>
    </div>
    <div style="color:var(--fg-dim);font-size:11px;margin-top:6px">exception: kawaii / catgirl / uwu personality presets (agent voice)</div>
  </div></div></body></html>
