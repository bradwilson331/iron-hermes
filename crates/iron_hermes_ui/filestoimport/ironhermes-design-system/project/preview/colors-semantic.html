<!doctype html>
<html><head><meta charset="utf-8"><title>colors-semantic</title>
<link rel="stylesheet" href="_card.css"></head>
<body><div class="card ">
  <div style="display:flex;flex-direction:column;gap:12px;font-size:14px">
    <div><span class="label" style="display:inline-block;width:130px">brand</span><span style="color:var(--brand);font-weight:700">IronHermes</span> <span class="label">wordmark, section titles, display</span></div>
    <div><span class="label" style="display:inline-block;width:130px">accent-primary</span><span style="color:var(--ansi-cyan);font-weight:700">Hermes:</span> <span class="label">Hermes: prefix, scanner, mode pill</span></div>
    <div><span class="label" style="display:inline-block;width:130px">accent-secondary</span><span style="color:var(--ansi-magenta)">claude-sonnet-4</span> <span class="label">model pill (index 1)</span></div>
    <div><span class="label" style="display:inline-block;width:130px">success</span><span style="color:var(--ansi-green)">configured</span>   <span style="color:var(--ansi-green);font-weight:700">[OK]</span>   <span style="color:var(--ansi-green);font-weight:700">You:</span></div>
    <div><span class="label" style="display:inline-block;width:130px">warn</span><span style="color:var(--ansi-yellow);font-weight:700">[MISSING]</span>   <span style="color:var(--ansi-yellow)">read_file</span></div>
    <div><span class="label" style="display:inline-block;width:130px">danger</span><span style="color:var(--ansi-red)">not set</span>   <span style="color:var(--ansi-red)">^C×3 — emergency exit</span></div>
    <div><span class="label" style="display:inline-block;width:130px">fg-dim</span><span style="color:var(--fg-dim)">Tool: read_file · ctrl+c cancel</span></div>
  </div></div></body></html>
