<!doctype html>
<html lang="en" data-theme="slate-dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1440"/>
  <title>IronHermes · Design System</title>
  <link rel="stylesheet" href="tokens.css"/>
  <link rel="stylesheet" href="components.css"/>
  <style>
    /* Page shell */
    .ds-shell { display: grid; grid-template-columns: 232px 1fr; height: 100vh; overflow: hidden; }
    .ds-nav {
      background: var(--bg-surface);
      border-right: 1px solid var(--border-subtle);
      padding: var(--sp-6) var(--sp-4);
      overflow-y: auto;
    }
    .ds-nav .brand { display: flex; align-items: center; gap: var(--sp-2); padding: 0 var(--sp-2) var(--sp-6); }
    .ds-nav .brand .glyph {
      width: 28px; height: 28px; border-radius: var(--r-3);
      background: var(--accent);
      display: grid; place-items: center; color: var(--fg-on-accent);
      font-family: var(--font-mono-cond); font-weight: 700; font-size: 15px;
    }
    .ds-nav .brand .wordmark { font-family: var(--font-mono-cond); font-weight: 700; font-size: var(--fs-16); letter-spacing: -0.01em; }
    .ds-nav .brand .wordmark .fe { color: var(--accent); }
    .ds-nav .group { margin-top: var(--sp-5); }
    .ds-nav .group-label {
      font-family: var(--font-mono); font-size: var(--fs-10); text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--fg-faint); padding: 0 var(--sp-2) var(--sp-2);
    }
    .ds-nav button.item {
      width: 100%; text-align: left; display: flex; align-items: center; gap: var(--sp-3);
      padding: 6px var(--sp-3); border-radius: var(--r-2);
      background: transparent; border: 0; cursor: pointer;
      font-family: var(--font-sans); font-size: var(--fs-13); color: var(--fg-muted);
      margin-bottom: 1px;
    }
    .ds-nav button.item:hover { background: var(--bg-raised); color: var(--fg); }
    .ds-nav button.item.active { background: var(--bg-selected); color: var(--fg); }
    .ds-nav button.item .num { margin-left: auto; font-family: var(--font-mono); color: var(--fg-faint); font-size: var(--fs-11); }
    .ds-nav button.item .ic { color: var(--fg-faint); width: 14px; display: inline-flex; }
    .ds-nav button.item.active .ic { color: var(--accent); }

    .ds-main { overflow: hidden; display: flex; flex-direction: column; background: var(--bg-canvas); }
    .ds-topbar {
      height: 46px; flex-shrink: 0;
      padding: 0 var(--sp-6);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      display: flex; align-items: center; gap: var(--sp-4);
    }
    .ds-topbar .crumbs {
      font-family: var(--font-mono); font-size: var(--fs-12); color: var(--fg-dim);
      display: flex; align-items: center; gap: var(--sp-2);
    }
    .ds-topbar .crumbs .sep { color: var(--fg-faint); }
    .ds-topbar .crumbs .here { color: var(--fg); }
    .ds-viewport { flex: 1; min-height: 0; overflow: auto; position: relative; }

    /* Frame container used to preview screens at 1:1 with scaling */
    .ds-frame {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-4);
      overflow: hidden;
    }

    /* Platform showcase: floating devices on a neutral canvas */
    .ds-stage {
      padding: var(--sp-9);
      background:
        radial-gradient(ellipse at top left, color-mix(in oklch, var(--accent) 8%, transparent) 0%, transparent 60%),
        var(--bg-canvas);
      min-height: 100%;
    }
    .ds-stage-title {
      font-family: var(--font-mono-cond); font-weight: 700;
      font-size: var(--fs-28); color: var(--fg); margin: 0 0 var(--sp-2);
      letter-spacing: -0.01em;
    }
    .ds-stage-sub {
      font-family: var(--font-sans); color: var(--fg-muted); font-size: var(--fs-14);
      max-width: 68ch; margin: 0 0 var(--sp-8);
    }

    /* Theme switcher */
    .ds-theme-switch {
      position: fixed; right: 20px; top: 64px; z-index: 50;
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: var(--r-4); padding: var(--sp-2);
      box-shadow: var(--shadow-2);
      display: flex; flex-direction: column; gap: 1px;
      min-width: 200px; font-family: var(--font-mono); font-size: var(--fs-12);
    }
    .ds-theme-switch h4 {
      margin: 0; padding: var(--sp-2) var(--sp-3) var(--sp-1);
      font-size: var(--fs-10); text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--fg-faint); font-weight: 600;
    }
    .ds-theme-switch .row {
      display: flex; align-items: center; gap: var(--sp-2);
      padding: 5px var(--sp-2); border-radius: var(--r-2); cursor: pointer;
      color: var(--fg-muted);
    }
    .ds-theme-switch .row:hover { background: var(--bg-raised); color: var(--fg); }
    .ds-theme-switch .row.active { color: var(--fg); background: var(--bg-selected); }
    .ds-theme-switch .swatches {
      display: inline-flex; gap: 2px; padding: 1px; background: var(--bg-canvas);
      border: 1px solid var(--border-subtle); border-radius: 3px; flex-shrink: 0;
    }
    .ds-theme-switch .swatches i { width: 10px; height: 12px; display: block; border-radius: 1px; }
    .ds-theme-switch .row .label { flex: 1; }
    .ds-theme-switch .row .check { color: var(--accent); opacity: 0; }
    .ds-theme-switch .row.active .check { opacity: 1; }

    /* TUI simulator */
    .ds-tui {
      font-family: var(--font-mono); font-size: 13px; line-height: 1.45;
      background: #0a0d10; color: #c9d1d9; padding: 20px 28px;
      border-radius: var(--r-4); border: 1px solid #1f252b;
      max-width: 880px; white-space: pre-wrap;
    }
    .ds-tui .c-cyan { color: #39c5cf; }
    .ds-tui .c-green { color: #3fb950; }
    .ds-tui .c-yellow { color: #d29922; }
    .ds-tui .c-magenta { color: #bc8cff; }
    .ds-tui .c-red { color: #f85149; }
    .ds-tui .c-dim { color: #6e7681; }
    .ds-tui .c-bright { color: #f0f6fc; }
    .ds-tui .bold { font-weight: 700; }

    /* Icon grid */
    .icon-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: var(--sp-3); }
    .icon-grid .cell {
      padding: var(--sp-4) var(--sp-3);
      border: 1px solid var(--border-subtle); border-radius: var(--r-3);
      display: flex; flex-direction: column; align-items: center; gap: var(--sp-2);
      background: var(--bg-surface);
    }
    .icon-grid .cell .name {
      font-family: var(--font-mono); font-size: var(--fs-10);
      color: var(--fg-dim);
    }

    /* Swatch card */
    .swatch-row { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-3) 0; border-bottom: 1px solid var(--border-subtle); }
    .swatch-row:last-child { border-bottom: 0; }
    .swatch-row .sw { width: 36px; height: 36px; border-radius: var(--r-3); border: 1px solid var(--border-subtle); flex-shrink: 0; }
    .swatch-row .meta { font-family: var(--font-mono); font-size: var(--fs-12); color: var(--fg-dim); }
    .swatch-row .name { font-family: var(--font-mono); font-size: var(--fs-13); color: var(--fg); font-weight: 500; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components -->
  <script type="text/babel" src="components/icons.jsx"></script>
  <script type="text/babel" src="components/ih-components.jsx"></script>
  <script type="text/babel" src="components/ih-screens.jsx"></script>
  <script type="text/babel" src="components/ih-screens-2.jsx"></script>
  <script type="text/babel" src="components/macos-window.jsx"></script>
  <script type="text/babel" src="components/ios-frame.jsx"></script>
  <script type="text/babel" src="components/browser-window.jsx"></script>
  <script type="text/babel" src="app/overview.jsx"></script>
  <script type="text/babel" src="app/tokens-view.jsx"></script>
  <script type="text/babel" src="app/components-view.jsx"></script>
  <script type="text/babel" src="app/platforms-view.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>
</body>
</html>
