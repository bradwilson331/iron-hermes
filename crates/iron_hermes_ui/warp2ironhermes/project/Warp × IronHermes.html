<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Warp × IronHermes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="ironhermes/colors_and_type.css">
<link rel="stylesheet" href="styles/warp-ih.css">
<style>
  html, body { margin: 0; padding: 0; background: #15171b; color: var(--fg); font-family: var(--font-mono); }
  body { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
<script type="text/babel" src="app/frames.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "green",
  "density": "compact",
  "block": "framed",
  "agent": "bottom",
  "personality": "default",
  "scanner": true
}/*EDITMODE-END*/;

function Root() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <DesignCanvas>
        {/* ─── 01 · Warp Classic — desktop ─────────────────── */}
        <DCSection id="desktop" title="Desktop · macOS"
          subtitle="Warp's signature block stream + persistent IronHermes agent panel on the right">
          <DCArtboard id="01-classic" label="01 · Classic — agent right" width={1180} height={740}>
            <DesktopFrame width={1180} height={740}>
              <WarpHermes variant="classic" tweaks={{ ...t, agent: "right" }} />
            </DesktopFrame>
          </DCArtboard>
          <DCArtboard id="02-flat" label="02 · Hermes Mono — flat blocks" width={1180} height={740}>
            <DesktopFrame width={1180} height={740}>
              <WarpHermes variant="classic" tweaks={{ ...t, block: "flat", agent: "right" }} />
            </DesktopFrame>
          </DCArtboard>
        </DCSection>

        {/* ─── 02 · Web ─────────────────────────────────────── */}
        <DCSection id="web" title="Web · Browser"
          subtitle="Same Dioxus codebase, served as WASM. Bottom agent dock for narrower viewports.">
          <DCArtboard id="03-bottom" label="03 · Bottom console" width={1180} height={740}>
            <WebFrame width={1180} height={740}>
              <WarpHermes variant="bottom" tweaks={{ ...t, agent: "bottom" }} />
            </WebFrame>
          </DCArtboard>
          <DCArtboard id="04-inline" label="04 · Inline sigil — agent in stream" width={1180} height={740}>
            <WebFrame width={1180} height={740}>
              <WarpHermes variant="inline" tweaks={{ ...t, agent: "hidden", block: "minimal" }} />
            </WebFrame>
          </DCArtboard>
        </DCSection>

        {/* ─── 03 · iOS ─────────────────────────────────────── */}
        <DCSection id="ios" title="iOS · iPhone"
          subtitle="Tabbed shell: terminal · agent · files. Compact density, sheet-based palette.">
          <DCArtboard id="05-ios" label="05 · iOS — tabbed shell" width={396} height={796}>
            <IOSPhoneFrame width={380} height={780}>
              <WarpHermesMobile tweaks={t} />
            </IOSPhoneFrame>
          </DCArtboard>
          <DCArtboard id="06-ios-amber" label="06 · iOS — amber theme" width={396} height={796}>
            <IOSPhoneFrame width={380} height={780}>
              <WarpHermesMobile tweaks={{ ...t, theme: "amber" }} />
            </IOSPhoneFrame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Accent" value={t.theme}
          options={["cyan", "magenta", "green", "amber"]}
          onChange={(v) => setTweak("theme", v)} />
        <TweakRadio label="Density" value={t.density}
          options={["compact", "comfy"]}
          onChange={(v) => setTweak("density", v)} />

        <TweakSection label="Blocks" />
        <TweakRadio label="Style" value={t.block}
          options={["framed", "flat", "minimal"]}
          onChange={(v) => setTweak("block", v)} />

        <TweakSection label="Agent" />
        <TweakRadio label="Position" value={t.agent}
          options={["right", "bottom", "hidden"]}
          onChange={(v) => setTweak("agent", v)} />
        <TweakSelect label="Personality" value={t.personality}
          options={["default", "concise", "technical", "noir", "hype", "catgirl"]}
          onChange={(v) => setTweak("personality", v)} />

        <TweakSection label="Motion" />
        <TweakToggle label="Scanner active" value={t.scanner}
          onChange={(v) => setTweak("scanner", v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
